<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Ferify</title>

    <!-- Import Inter Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #F3F3F3;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            color: #111111;
        }

        .email-wrapper {
            width: 100%;
            padding: 40px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }


        .logo-container {
            width: 100%;
            max-width: 400px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
        }

        .logo-img {
            width: 28px;
            height: 28px;
            fill: #000000;
            margin-right: 8px;
        }

        .logo-text {
            font-size: 22px;
            font-weight: 700;
            color: #000000;
            letter-spacing: -0.5px;
            padding-left: 10px;
            padding-top: 6px;
        }

        .card {
            background-color: #ffffff;
            width: 100%;
            max-width: 360px;
            padding: 40px 30px;
            box-sizing: border-box;
            border-radius: 2px;
            text-align: left;
        }

        .illustration-container {
            margin-bottom: 25px;
            margin-left: -10px;
        }

        .illustration-svg {
            width: 80px;
            height: 65px;
        }

        h1 {
            font-size: 20px;
            font-weight: 700;
            margin: 0 0 16px 0;
            color: #000000;
            line-height: 1.3;
        }

        p {
            font-size: 13px;
            color: #333333;
            line-height: 1.5;
            margin: 0 0 16px 0;
        }




        /* Verification Code */
        .code {
            font-size: 28px;
            font-weight: 700;
            color: #000000;
            margin-top: 24px;
            margin-bottom: 24px;
            letter-spacing: 0.5px;
        }

        .disclaimer {
            font-size: 11px;
            color: #555555;
            line-height: 1.4;
            margin-bottom: 40px;
            max-width: 90%;
        }

        .card-footer {
            margin-top: 10px;
        }

        .footer-brand {
            font-size: 12px;
            font-weight: 700;
            color: #000000;
            margin-bottom: 4px;
        }

        .footer-tagline {
            font-size: 11px;
            color: #444444;
        }
    </style>
</head>

<body>

    <div class="email-wrapper">

        <!-- Logo Header -->
        <div class="logo-container">
            <img 
                src="https://res.cloudinary.com/dvgqi0ajq/image/upload/v1771852978/phaw7lrfxayllugh4w5f.png" 
                alt="Ferify Logo" 
                width="44.02" 
                height="52" 
            />
            <span class="logo-text">Ferify</span>
        </div>

        <!-- White Card -->
        <div class="card">

            <!-- Green Castle & Blue Key Illustration -->
            <div class="illustration-container">
                <img 
                    src="https://res.cloudinary.com/dvgqi0ajq/image/upload/v1771853004/l3h6bnqo3xtdrnmmnqvd.png" 
                    alt="Reset Password Icon" 
                    width="150.3" 
                    height="108" 
                />
            </div>

            <h1>Reset your password</h1>

            <p>We have received request to reset the password for your Ferify account.</p>

            <p>Use the code below to create a new password:</p>

            <div class="code">{{otp}}</div>

            <p class="disclaimer">
                If you didn't request this, you can ignore this email, your account is still secure.
            </p>

            <!-- Footer -->
            <div class="card-footer">
                <div class="footer-brand">Ferify</div>
                <div class="footer-tagline">Helping people move faster</div>
            </div>

        </div>
    </div>

</body>

</html>
